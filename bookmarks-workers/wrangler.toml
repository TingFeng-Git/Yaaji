name = "yaji-bookmarks"
main = "src/worker.ts"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]

# 开发服务器配置
[dev]
port = 8787

# D1 数据库绑定（部署前请替换为你的真实 Database ID）
# 可通过 `npx wrangler d1 info yaaji-bookmarks` 获取
[[d1_databases]]
binding = "DB"
database_name = "yaaji-bookmarks"
database_id = "47671840-7144-4958-ab80-16e88e847c1e"

# Durable Objects 配置
[[durable_objects.bindings]]
name = "IMPORT_TASKS"
class_name = "ImportTaskDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ImportTaskDO"]
