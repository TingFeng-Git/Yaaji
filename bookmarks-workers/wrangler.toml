name = "yaji-bookmarks"
main = "src/worker.ts"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]

# 开发服务器配置
[dev]
port = 8787

# D1 数据库绑定（请替换为你的真实 Database ID）
[[d1_databases]]
binding = "DB"
database_name = "yaji-bookmarks"
database_id = "YOUR_DATABASE_ID_HERE"

# 环境变量（生产环境通过 Cloudflare Dashboard 设置）
[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:3000"

# Durable Objects 配置
[[durable_objects.bindings]]
name = "IMPORT_TASKS"
class_name = "ImportTaskDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ImportTaskDO"]
