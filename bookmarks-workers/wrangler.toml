name = "yaji-bookmarks"
main = "src/worker.ts"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]

# 开发服务器配置
[dev]
port = 8787

# D1 数据库绑定（请替换为你的真实 Database ID）
[[d1_databases]]
binding = "DB"
database_name = "yaaji-bookmarks"
database_id = "47671840-7144-4958-ab80-16e88e847c1e"

# 环境变量（生产环境通过 Cloudflare Dashboard 设置）
[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://yaaji.pages.dev"

# Durable Objects 配置
[[durable_objects.bindings]]
name = "IMPORT_TASKS"
class_name = "ImportTaskDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ImportTaskDO"]
