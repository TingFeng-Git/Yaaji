name = "yaji-bookmarks"
main = "src/worker.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

# 开发服务器配置
[dev]
port = 8787

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "yaji-bookmarks"
database_id = "YOUR_DATABASE_ID_HERE"

# 环境变量
[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:3000"

# Durable Objects 配置
[[durable_objects.bindings]]
name = "IMPORT_TASKS"
class_name = "ImportTaskDO"

[[migrations]]
tag = "v1"
new_classes = ["ImportTaskDO"]

# 生产环境配置 (通过 --env production 使用)
[env.production]
vars = { ENVIRONMENT = "production", CORS_ORIGIN = "https://bookmarks.example.com" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "yaji-bookmarks"
database_id = "YOUR_PRODUCTION_DATABASE_ID"

[[env.production.durable_objects.bindings]]
name = "IMPORT_TASKS"
class_name = "ImportTaskDO"

[[env.production.migrations]]
tag = "v1"
new_classes = ["ImportTaskDO"]
